version: '3.8'

services:
  postgres:
    image: postgis/postgis:15-3.3
    container_name: eureka_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-eureka}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-eurekapass}
      POSTGRES_DB: ${POSTGRES_DB:-eureka_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/scripts/init_db.sql:/docker-entrypoint-initdb.d/init_db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-eureka}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: eureka_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: eureka_backend
    env_file: .env
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - reports_data:/app/reports
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # NEXT_PUBLIC_* precisa ser build arg — gravado no bundle do browser
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://api.vps7522.panel.icontainer.net}
    container_name: eureka_frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    environment:
      # SSR server-side: aponta direto para o container backend (sem passar pelo Nginx)
      - INTERNAL_API_URL=http://eureka_backend:8000
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://api.vps7522.panel.icontainer.net}
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: eureka_nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  reports_data:
