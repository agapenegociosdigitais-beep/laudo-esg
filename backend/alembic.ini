[alembic]
# Caminho para o diretório de migrations
script_location = alembic

# Template de nome dos arquivos de migration
file_template = %%(year)d%%(month)02d%%(day)02d_%%(hour)02d%%(minute)02d_%%(rev)s_%%(slug)s

# Encoding do arquivo de migration
prepend_sys_path = .

# Usa a DATABASE_URL do arquivo .env — sobrescrito em env.py via pydantic
sqlalchemy.url = postgresql://eureka:eurekapass@localhost:5432/eureka_db

[post_write_hooks]
# Formata o arquivo de migration gerado com ruff (se disponível)
# hooks = ruff
# ruff.type = exec
# ruff.entrypoint = ruff
# ruff.options = check --fix REVISION_SCRIPT_FILENAME

[loggers]
keys = root, sqlalchemy, alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
