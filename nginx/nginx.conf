events {
    worker_connections 1024;
}

http {
    # Configurações gerais
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    client_max_body_size 20M;

    # Logs
    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log;

    # ── Frontend: app.vps7522.panel.icontainer.net ──────────────────────────
    server {
        listen 80;
        server_name app.vps7522.panel.icontainer.net vps7522.panel.icontainer.net;

        location / {
            proxy_pass         http://eureka_frontend:3000;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade $http_upgrade;
            proxy_set_header   Connection 'upgrade';
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
        }
    }

    # ── Backend API: api.vps7522.panel.icontainer.net ───────────────────────
    server {
        listen 80;
        server_name api.vps7522.panel.icontainer.net;

        location / {
            proxy_pass         http://eureka_backend:8000;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            # CORS para o domínio do frontend
            add_header 'Access-Control-Allow-Origin' 'http://app.vps7522.panel.icontainer.net' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type' always;

            if ($request_method = 'OPTIONS') {
                return 204;
            }
        }
    }
}
