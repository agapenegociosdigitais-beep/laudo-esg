events {
    worker_connections 1024;
}

http {
    # Configurações gerais
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    client_max_body_size 20M;

    # Logs
    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log;

    # ── Server for laudoesg.com and IP (HTTP)  ───────────────────────────────────
    server {
        listen 80;
        server_name laudoesg.com www.laudoesg.com 23.106.45.137;

        # Backend API routes
        location /api/v1 {
            # Handle CORS preflight FIRST
            if ($request_method = 'OPTIONS') {
                add_header 'Access-Control-Allow-Origin' 'http://23.106.45.137:3000' always;
                add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS' always;
                add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type' always;
                add_header 'Access-Control-Allow-Credentials' 'true' always;
                add_header 'Content-Length' '0' always;
                return 204;
            }

            proxy_pass         http://eureka_backend:8000;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Connection '';

            # CORS headers for regular requests
            add_header 'Access-Control-Allow-Origin' 'http://23.106.45.137:3000' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type' always;
            add_header 'Access-Control-Allow-Credentials' 'true' always;
        }

        # Health check endpoint
        location /health {
            proxy_pass         http://eureka_backend:8000;
        }

        # Frontend - Static files and all other routes
        location / {
            proxy_pass         http://eureka_frontend:3000;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Connection '';

            # Cache static assets
            proxy_cache_valid 200 30d;
            proxy_cache_bypass $http_pragma $http_authorization;
        }
    }
}
